<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — TaskFlow</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✓</text></svg>" />
</head>
<body class="dashboard-layout">

  <!-- Navbar -->
  <nav class="navbar">
    <a class="navbar-brand" href="#">
      <div class="logo-icon">✓</div>
      TaskFlow
    </a>
    <div class="navbar-right">
      <div class="user-badge">
        <div class="avatar" id="userAvatar">?</div>
        <span id="userName">Loading...</span>
      </div>
      <button class="btn btn--ghost" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="dashboard-main">
    <div class="container--wide">

      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-label">Total</div>
          <div class="stat-value" id="statTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Completed</div>
          <div class="stat-value" id="statDone">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active</div>
          <div class="stat-value" id="statActive">—</div>
        </div>
      </div>

      <!-- Add Task -->
      <div class="add-task-section">
        <form class="add-task-form" id="addTaskForm">
          <input
            type="text"
            id="newTaskInput"
            placeholder="Add a new task..."
            maxlength="200"
            autocomplete="off"
            required
          />
          <button type="submit" class="btn--add" id="addTaskBtn">
            <span>+</span> Add Task
          </button>
        </form>
      </div>

      <!-- Filters -->
      <div class="task-filters" role="tablist" aria-label="Task filters">
        <button class="filter-btn active" data-filter="all" role="tab">All</button>
        <button class="filter-btn" data-filter="active" role="tab">Active</button>
        <button class="filter-btn" data-filter="completed" role="tab">Completed</button>
      </div>

      <!-- Task List Header -->
      <div class="task-list-header">
        <span class="task-list-title">Tasks</span>
      </div>

      <!-- Tasks -->
      <ul class="task-list" id="taskList" aria-live="polite">
        <!-- Populated by JS -->
      </ul>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="empty-icon">📋</div>
        <h3>No tasks yet</h3>
        <p>Add your first task above to get started.</p>
      </div>

    </div>
  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer" aria-live="assertive"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
